<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySync | Tasks</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">
            📚 StudySync
        </div>

        <ul class="nav-links">

            <li><a href="index.html">Dashboard</a></li>

            <li>
                <a class="active" href="tasks.html">
                    Tasks
                </a>
            </li>

            <li><a href="exams.html">Exams</a></li>

            <li><a href="progress.html">Progress</a></li>

        </ul>

    </nav>

</header>

<section class="dashboard">

    <h2>
        Task Management
    </h2>

    <!-- Add Task Form -->

    <div class="task-form">

        <input
            type="text"
            id="taskName"
            placeholder="Enter Task Name">

        <input
            type="text"
            id="subject"
            placeholder="Subject">

        <input
            type="date"
            id="dueDate">

        <select id="priority">

            <option value="High">
                High Priority
            </option>

            <option value="Medium">
                Medium Priority
            </option>

            <option value="Low">
                Low Priority
            </option>

        </select>

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <!-- Search -->

    <div class="search-box">

        <input
            type="text"
            id="searchTask"
            placeholder="Search Tasks..."
            onkeyup="searchTasks()">

    </div>

    <!-- Task List -->

    <div id="taskList">

    </div>

</section>

<footer>

    <p>
        © 2026 StudySync
    </p>

</footer>

<script src="js/app.js"></script>

</body>

</html>
